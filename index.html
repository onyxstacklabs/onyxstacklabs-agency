<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnyxStack Labs | Premium Agency</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
            padding: 20px;
        }
        .logo-text {
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffffff;
            margin-bottom: 10px;
        }
        .cyan-glow {
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }
        .tagline {
            font-size: 1.2rem;
            color: #888888;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .badge {
            display: inline-block;
            padding: 6px 16px;
            border: 1px solid #00ff99;
            color: #00ff99;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo-text">OnyxStack <span class="cyan-glow">Labs</span></h1>
        <p class="tagline">Next-Gen Digital Solutions</p>
        <div class="badge">Coming Soon</div>
    </div>
</body>
</html>
