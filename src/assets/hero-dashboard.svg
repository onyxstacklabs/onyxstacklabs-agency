<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937" stop-opacity=".65"/>
      <stop offset="100%" stop-color="#111827" stop-opacity=".25"/>
    </linearGradient>

    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <circle cx="220" cy="720" r="180" fill="#06B6D4" opacity=".35" filter="url(#blur)"/>
  <circle cx="1130" cy="180" r="140" fill="#2563EB" opacity=".28" filter="url(#blur)"/>
  <circle cx="760" cy="180" r="170" fill="#14B8A6" opacity=".30" filter="url(#blur)"/>

  <rect x="220" y="140" rx="28" ry="28" width="960" height="620"
        fill="url(#glass)"
        stroke="#2DD4BF"
        stroke-opacity=".18"/>

  <rect x="270" y="210" width="300" height="150" rx="18"
        fill="#0F172A"
        stroke="#06B6D4"
        stroke-opacity=".25"/>

  <rect x="610" y="210" width="520" height="150" rx="18"
        fill="#0F172A"
        stroke="#06B6D4"
        stroke-opacity=".25"/>

  <rect x="270" y="405" width="860" height="280" rx="20"
        fill="#0F172A"
        stroke="#06B6D4"
        stroke-opacity=".18"/>

  <polyline
      fill="none"
      stroke="#06B6D4"
      stroke-width="6"
      points="320,590 430,520 520,550 640,450 760,500 900,360 1060,430"/>

  <circle cx="430" cy="520" r="7" fill="#06B6D4"/>
  <circle cx="640" cy="450" r="7" fill="#06B6D4"/>
  <circle cx="900" cy="360" r="7" fill="#06B6D4"/>
</svg>
